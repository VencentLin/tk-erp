{% extends "dashboard/base.html" %}
{% block title %}编辑模板 - TK-ERP{% endblock %}

{% block content %}
<div class="topbar"><h5>✏️ 编辑模板</h5><a href="{% url 'template_list' %}" class="btn btn-outline-secondary rounded-pill">← 返回</a></div>

<div class="row justify-content-center"><div class="col-lg-8">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="card border-0 shadow-sm" style="border-radius:12px;">
            <div class="card-body p-4">
                {% if template.image %}
                <img src="{{ template.image.url }}" style="max-width:100%; max-height:350px; border-radius:12px; display:block; margin:0 auto 20px;">
                {% endif %}
                <div class="mb-3"><label class="form-label">模板名称</label><input name="name" value="{{ template.name }}" class="form-control" required></div>
                <div class="mb-3"><label class="form-label">替换图片</label><input type="file" name="image" accept="image/*" class="form-control"></div>
                <div class="mb-3"><label class="form-label">颜色</label>
                    <select name="color" class="form-select">
                        {% for k, v in template.COLOR_CHOICES %}
                        <option value="{{ k }}" {% if template.color == k %}selected{% endif %}>{{ v }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-check form-switch"><input class="form-check-input" type="checkbox" name="is_active" {% if template.is_active %}checked{% endif %}><label class="form-check-label">启用</label></div>
            </div>
            <div class="card-footer bg-transparent text-end"><button type="submit" class="btn btn-primary rounded-pill">保存修改</button></div>
        </div>
    </form>
</div></div>
{% endblock %}
