<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TK-ERP 印花管理系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@1.9.12/dist/htmx.min.js"></script>
    <style>
        :root { --sidebar-width: 250px; }
        body { background: #f5f6fa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .sidebar {
            position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-width);
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px 0; overflow-y: auto; z-index: 1000;
        }
        .sidebar .logo { color: #fff; font-size: 20px; font-weight: 700; padding: 0 20px 20px; border-bottom: 1px solid rgba(255,255,255,.1); margin-bottom: 15px; }
        .sidebar .logo span { color: #667eea; }
        .sidebar .nav-link {
            color: rgba(255,255,255,.7); padding: 12px 20px; margin: 2px 10px; border-radius: 8px;
            font-size: 14px; transition: all .2s; display: flex; align-items: center; gap: 10px;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: rgba(102,126,234,.2); }
        .sidebar .nav-link i { font-size: 18px; width: 24px; text-align: center; }
        .sidebar .nav-section { color: rgba(255,255,255,.4); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; padding: 20px 20px 8px; }

        .main { margin-left: var(--sidebar-width); padding: 25px; }
        .topbar { background: #fff; border-radius: 12px; padding: 15px 25px; margin-bottom: 25px;
            display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
        .topbar h5 { margin: 0; font-weight: 600; color: #1a1a2e; }

        .stat-card {
            background: #fff; border-radius: 12px; padding: 20px 25px; box-shadow: 0 1px 3px rgba(0,0,0,.05);
            display: flex; align-items: center; gap: 15px; transition: transform .2s;
        }
        .stat-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.1); }
        .stat-card .icon { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .stat-card .value { font-size: 28px; font-weight: 700; color: #1a1a2e; }
        .stat-card .label { font-size: 13px; color: #888; }

        .card-table { background: #fff; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.05); overflow: hidden; }
        .card-table .card-header { padding: 15px 25px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .card-table .card-header h6 { margin: 0; font-weight: 600; }
        .card-table table { margin: 0; }
        .card-table table th { font-size: 12px; text-transform: uppercase; color: #888; font-weight: 600; padding: 12px 15px; border-bottom: 1px solid #f0f0f0; }
        .card-table table td { padding: 12px 15px; vertical-align: middle; font-size: 14px; }

        .img-thumb { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; cursor: pointer; transition: transform .2s; }
        .img-thumb:hover { transform: scale(2.5); z-index: 99; position: relative; box-shadow: 0 8px 25px rgba(0,0,0,.3); }

        .badge-status { font-size: 12px; padding: 5px 10px; border-radius: 20px; }
        .status-completed { background: #d1fae5; color: #065f46; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-processing { background: #dbeafe; color: #1e40af; }
        .status-failed { background: #fee2e2; color: #991b1b; }

        .upload-zone {
            border: 2px dashed #d1d5db; border-radius: 12px; padding: 40px; text-align: center;
            cursor: pointer; transition: all .2s; background: #fafafa;
        }
        .upload-zone:hover, .upload-zone.dragover { border-color: #667eea; background: #f0f2ff; }

        .filter-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .filter-bar select, .filter-bar .btn { border-radius: 8px; }

        @media (max-width: 768px) {
            .sidebar { width: 70px; }
            .sidebar .logo, .sidebar .nav-link span, .sidebar .nav-section { display: none; }
            .sidebar .nav-link { justify-content: center; padding: 12px; }
            .main { margin-left: 70px; }
            :root { --sidebar-width: 70px; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="sidebar">
        <div class="logo">🎨 TK<span>-ERP</span></div>
        <div class="nav-section">主菜单</div>
        <a href="{% url 'dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
            <i class="bi bi-speedometer2"></i> <span>工作台</span>
        </a>
        <a href="{% url 'country_list' %}" class="nav-link {% if 'country' in request.resolver_match.url_name %}active{% endif %}">
            <i class="bi bi-building"></i> <span>店铺管理</span>
        </a>
        <a href="{% url 'user_list' %}" class="nav-link {% if 'user' in request.resolver_match.url_name %}active{% endif %}">
            <i class="bi bi-people"></i> <span>用户管理</span>
        </a>
        <a href="{% url 'category_list' %}" class="nav-link {% if 'category' in request.resolver_match.url_name %}active{% endif %}">
            <i class="bi bi-folder"></i> <span>分类管理</span>
        </a>
        <a href="{% url 'template_list' %}" class="nav-link {% if 'template' in request.resolver_match.url_name %}active{% endif %}">
            <i class="bi bi-grid"></i> <span>T恤模板</span>
        </a>
        <a href="{% url 'product_create' %}" class="nav-link {% if request.resolver_match.url_name == 'product_create' %}active{% endif %}">
            <i class="bi bi-stars"></i> <span>创建产品</span>
        </a>
        <a href="{% url 'product_list' %}" class="nav-link {% if request.resolver_match.url_name == 'product_list' %}active{% endif %}">
            <i class="bi bi-box-seam"></i> <span>产品库</span>
        </a>
        <div class="nav-section">系统</div>
        <a href="{% url 'settings_page' %}" class="nav-link {% if 'settings' in request.resolver_match.url_name %}active{% endif %}">
            <i class="bi bi-gear"></i> <span>系统设置</span>
        </a>
        <a href="/admin/logout/" class="nav-link">
            <i class="bi bi-box-arrow-right"></i> <span>退出登录</span>
        </a>
    </nav>

    <div class="main">
        {% if messages %}
        {% for m in messages %}
        <div class="alert alert-{{ m.tags|default:'info' }} alert-dismissible fade show" role="alert">
            {{ m }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.upload-zone').forEach(zone => {
                zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
                zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
                zone.addEventListener('drop', e => {
                    e.preventDefault(); zone.classList.remove('dragover');
                    const input = zone.querySelector('input[type="file"]');
                    if (input) { input.files = e.dataTransfer.files; zone.querySelector('span').textContent = e.dataTransfer.files.length + ' 个文件已选择'; }
                });
            });
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
