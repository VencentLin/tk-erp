{% extends "dashboard/base.html" %}
{% block title %}上传印花 - TK-ERP{% endblock %}

{% block content %}
<div class="topbar">
    <h5>📤 上传印花</h5>
    <a href="{% url 'pattern_list' %}" class="btn btn-outline-secondary rounded-pill">← 返回列表</a>
</div>

<div class="row justify-content-center">
    <div class="col-lg-8">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="card border-0 shadow-sm" style="border-radius:12px;">
                <div class="card-body p-4">
                    <label class="upload-zone" style="display:block;">
                        <input type="file" name="images" multiple accept="image/*" style="display:none;" id="fileInput">
                        <i class="bi bi-cloud-upload" style="font-size:48px; color:#667eea;"></i>
                        <p class="mt-3 mb-1"><strong>点击选择图片</strong> 或拖拽文件到此处</p>
                        <small class="text-muted" id="fileCount">支持 JPG/PNG/WebP，可多选</small>
                    </label>

                    <div class="mb-3 mt-4">
                        <label class="form-label">图片来源类型</label>
                        <select name="source_type" class="form-select">
                            <option value="clean_print">干净印花（透明底）</option>
                            <option value="model_photo">模特上身图</option>
                            <option value="product_photo">产品平铺图</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">备注</label>
                        <input type="text" name="note" class="form-control" placeholder="可选：添加描述">
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg rounded-pill w-100">
                        <i class="bi bi-check-lg"></i> 确认上传
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
document.getElementById('fileInput').addEventListener('change', function() {
    document.getElementById('fileCount').textContent = '已选择 ' + this.files.length + ' 个文件';
});
</script>
{% endblock %}
