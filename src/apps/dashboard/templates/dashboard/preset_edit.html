{% extends "dashboard/base.html" %}
{% block title %}编辑预设 - TK-ERP{% endblock %}
{% block content %}
<div class="topbar"><h5>✏️ 编辑: {{ preset.name }}</h5><a href="{% url 'preset_list' %}" class="btn btn-outline-secondary rounded-pill">← 返回</a></div>

<div class="row justify-content-center"><div class="col-lg-8">
    <form method="post">{% csrf_token %}
        <div class="card border-0 shadow-sm" style="border-radius:12px;">
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">预设名称</label>
                    <input name="name" value="{{ preset.name }}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">正向 Prompt</label>
                    <textarea name="content" class="form-control" rows="12" style="font-family:monospace;font-size:13px;">{{ preset.content }}</textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">负面 Prompt</label>
                    <textarea name="negative_prompt" class="form-control" rows="4" style="font-family:monospace;font-size:13px;">{{ preset.negative_prompt }}</textarea>
                </div>
                <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" name="is_active" {% if preset.is_active %}checked{% endif %}>
                    <label class="form-check-label">启用</label>
                </div>
            </div>
            <div class="card-footer bg-transparent text-end">
                <button type="submit" class="btn btn-primary rounded-pill">保存</button>
            </div>
        </div>
    </form>
</div></div>
{% endblock %}
