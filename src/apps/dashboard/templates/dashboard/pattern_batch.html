{% extends "dashboard/base.html" %}
{% block title %}批量导入 - TK-ERP{% endblock %}

{% block content %}
<div class="topbar">
    <h5>📊 批量导入印花</h5>
    <a href="{% url 'pattern_list' %}" class="btn btn-outline-secondary rounded-pill">← 返回列表</a>
</div>

<div class="row justify-content-center">
    <div class="col-lg-8">
        {% if results %}
        <div class="card border-0 shadow-sm mb-4" style="border-radius:12px;">
            <div class="card-body p-4">
                <h5>导入结果</h5>
                <div class="row g-3 mb-3">
                    <div class="col-4"><div class="stat-card"><div class="icon" style="background:#d1fae5;"><i class="bi bi-check-lg" style="color:#059669;"></i></div><div><div class="value">{{ new_count }}</div><div class="label">新增</div></div></div></div>
                    <div class="col-4"><div class="stat-card"><div class="icon" style="background:#fef3c7;"><i class="bi bi-arrow-repeat" style="color:#d97706;"></i></div><div><div class="value">{{ dup_count }}</div><div class="label">重复</div></div></div></div>
                    <div class="col-4"><div class="stat-card"><div class="icon" style="background:#fee2e2;"><i class="bi bi-x-lg" style="color:#dc2626;"></i></div><div><div class="value">{{ err_count }}</div><div class="label">失败</div></div></div></div>
                </div>
                <a href="{% url 'pattern_batch' %}" class="btn btn-primary rounded-pill">继续导入</a>
            </div>
        </div>
        {% elif error %}
        <div class="alert alert-danger" style="border-radius:12px;">
            <pre style="font-size:12px; white-space: pre-wrap; margin:0;">{{ error }}</pre>
        </div>
        <a href="{% url 'pattern_batch' %}" class="btn btn-outline-primary rounded-pill">重试</a>
        {% else %}
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="card border-0 shadow-sm mb-3" style="border-radius:12px;">
                <div class="card-body p-4">
                    <label class="upload-zone" style="display:block; margin-bottom:0;">
                        <input type="file" name="images" multiple accept="image/*" style="display:none;" id="imgInput">
                        <i class="bi bi-images" style="font-size:48px; color:#667eea;"></i>
                        <p class="mt-3 mb-1"><strong>📁 上传图片文件</strong></p>
                        <small class="text-muted">可多选图片，支持拖拽文件夹</small>
                    </label>
                </div>
            </div>

            <div class="card border-0 shadow-sm mb-3" style="border-radius:12px;">
                <div class="card-body p-4">
                    <label class="upload-zone" style="display:block; margin-bottom:0; border-style:dashed; background:#fefce8;">
                        <input type="file" name="excel_file" accept=".xlsx,.xls" style="display:none;" id="excelInput">
                        <i class="bi bi-file-earmark-spreadsheet" style="font-size:48px; color:#d97706;"></i>
                        <p class="mt-3 mb-1"><strong>📊 或上传 Excel 表格</strong></p>
                        <small class="text-muted">自动识别表格中的图片链接并下载</small>
                    </label>
                </div>
            </div>

            <button type="submit" class="btn btn-success btn-lg rounded-pill w-100" id="submitBtn">
                <i class="bi bi-rocket-takeoff"></i> 开始导入
            </button>
        </form>
        {% endif %}
    </div>
</div>

<script>
document.querySelectorAll('input[type="file"]').forEach(inp => {
    inp.addEventListener('change', function() {
        this.parentElement.querySelector('p strong').textContent = '已选择 ' + this.files.length + ' 个文件';
    });
});
document.querySelector('form')?.addEventListener('submit', function() {
    document.getElementById('submitBtn').innerHTML = '<span class="spinner-border spinner-border-sm"></span> 正在导入（下载图片可能需要几分钟）…';
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').style.opacity = '0.7';
});
</script>
{% endblock %}
