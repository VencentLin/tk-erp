{% extends "dashboard/base.html" %}
{% block title %}分析图集 - TK-ERP{% endblock %}
{% block content %}
<div class="topbar"><h5>📤 上传图集分析分类</h5><a href="{% url 'category_list' %}" class="btn btn-outline-secondary rounded-pill">← 返回</a></div>
<div class="row justify-content-center"><div class="col-lg-8">
    <form method="post" enctype="multipart/form-data">{% csrf_token %}
        <div class="card border-0 shadow-sm" style="border-radius:12px;">
            <div class="card-body p-4 text-center">
                <i class="bi bi-images" style="font-size:64px;color:#667eea;"></i>
                <h5 class="mt-3">上传参考印花图集</h5>
                <p class="text-muted">豆包会自动分析并分类，生成对应的提示词文件</p>
                <input type="file" name="images" multiple accept="image/*" class="form-control mb-3" style="max-width:400px;margin:0 auto;">
                <small class="text-muted">支持多选图片，建议一次上传同一风格的图集</small>
            </div>
            <div class="card-footer bg-transparent text-center">
                <button type="submit" class="btn btn-primary btn-lg rounded-pill px-5"><i class="bi bi-magic"></i> 开始分析</button>
            </div>
        </div>
    </form>
</div></div>
{% endblock %}
