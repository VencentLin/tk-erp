{% extends "dashboard/base.html" %}
{% block title %}编辑印花 - TK-ERP{% endblock %}

{% block content %}
<div class="topbar"><h5>✏️ 编辑印花 #{{ pattern.id }}</h5><a href="{% url 'pattern_list' %}" class="btn btn-outline-secondary rounded-pill">← 返回</a></div>

<div class="row justify-content-center"><div class="col-lg-8">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="card border-0 shadow-sm mb-3" style="border-radius:12px;">
            <div class="card-body p-4">
                {% if pattern.image %}
                <img src="{{ pattern.image.url }}" style="max-width:100%; max-height:400px; border-radius:12px; display:block; margin:0 auto 20px;">
                {% endif %}
                <div class="mb-3"><label class="form-label">替换图片</label><input type="file" name="image" accept="image/*" class="form-control"></div>
                <div class="mb-3"><label class="form-label">类型</label>
                    <select name="source_type" class="form-select">
                        {% for k, v in pattern.SOURCE_CHOICES %}
                        <option value="{{ k }}" {% if pattern.source_type == k %}selected{% endif %}>{{ v }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3"><label class="form-label">备注</label><input name="note" value="{{ pattern.note }}" class="form-control"></div>
            </div>
            <div class="card-footer bg-transparent text-end">
                <button type="submit" class="btn btn-primary rounded-pill">保存修改</button>
            </div>
        </div>
    </form>
</div></div>
{% endblock %}
