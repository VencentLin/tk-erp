<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>登录 - TK-ERP</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><style>body{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;}.login-card{background:#fff;border-radius:16px;padding:40px;width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3);}.login-card h2{font-weight:700;color:#1a1a2e;margin-bottom:8px;}.login-card .subtitle{color:#888;font-size:14px;margin-bottom:30px;}.login-card input{border-radius:10px;padding:12px 15px;}.login-card .btn{border-radius:10px;padding:12px;font-weight:600;}</style></head><body><div class="login-card"><div style="text-align:center;margin-bottom:20px;"><span style="font-size:48px;">🎨</span><h2>TK-ERP</h2><p class="subtitle">TikTok 印花T恤 AI生成系统</p></div>{% if form.errors %}<div class="alert alert-danger" style="border-radius:10px;font-size:14px;">用户名或密码错误</div>{% endif %}<form method="post">{% csrf_token %}<div class="mb-3"><input type="text" name="username" class="form-control" placeholder="用户名" required autofocus></div><div class="mb-4"><input type="password" name="password" class="form-control" placeholder="密码" required></div><button type="submit" class="btn btn-primary w-100">登 录</button><input type="hidden" name="next" value="{{ next }}"></form></div></body></html>
